version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: students
      - name: courses
      - name: predictions

models:
  - name: stg_students
    description: Staged student data with cleaned fields
    columns:
      - name: student_id
        description: Unique student identifier
        tests:
          - unique
          - not_null
      - name: gpa
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 4.0

  - name: stg_predictions
    description: Staged prediction results
    columns:
      - name: id
        tests:
          - unique
          - not_null

  - name: mart_student_risk_summary
    description: Aggregated student risk metrics by program and cohort
    columns:
      - name: program
        tests:
          - not_null
